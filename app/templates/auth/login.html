{% extends "base.html" %}
{% block title %}{{ ui.login_title }} — AdCritic{% endblock %}

{% block content %}
<div class="container auth-container">
  <div class="auth-card">
    <h1 class="auth-title">{{ ui.login_title }}</h1>

    <form method="post" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="email">{{ ui.email_label }}</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          value="{{ request.form.email or '' }}"
          required
          autofocus
        />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">{{ ui.password_label }}</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          required
        />
      </div>
      <button type="submit" class="auth-btn">{{ ui.login_btn }}</button>
    </form>

    <p class="auth-switch" style="margin-top:.9rem">
      <a href="{{ forgot_password_url }}">{{ ui.forgot_link }}</a>
    </p>

    <p class="auth-switch">
      {{ ui.no_account }}
      <a href="{{ register_url }}">{{ ui.register_link }}</a>
    </p>
  </div>
</div>
{% endblock %}
