{% extends "base.html" %}
{% block title %}{{ ui.reset_title }} — AdCritic{% endblock %}

{% block content %}
<div class="container auth-container">
  <div class="auth-card">
    <h1 class="auth-title">{{ ui.reset_title }}</h1>

    <form method="post" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="password">{{ ui.password_label }}</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          required
          minlength="8"
          autofocus
        />
      </div>
      <button type="submit" class="auth-btn">{{ ui.reset_btn }}</button>
    </form>
  </div>
</div>
{% endblock %}
