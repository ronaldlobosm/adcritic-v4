{% extends "base.html" %}
{% block title %}{{ ui.forgot_title }} — AdCritic{% endblock %}

{% block content %}
<div class="container auth-container">
  <div class="auth-card">
    <h1 class="auth-title">{{ ui.forgot_title }}</h1>
    <p style="text-align:center;color:var(--color-muted,#666);font-size:.92rem;line-height:1.55;margin-bottom:1.5rem">
      {{ ui.forgot_body }}
    </p>

    <form method="post" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="email">{{ ui.email_label }}</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          value="{{ request.form.email or '' }}"
          required
          autofocus
        />
      </div>
      <button type="submit" class="auth-btn">{{ ui.forgot_btn }}</button>
    </form>

    <p class="auth-switch">
      <a href="{{ login_url }}">{{ ui.login_link }}</a>
    </p>
  </div>
</div>
{% endblock %}
