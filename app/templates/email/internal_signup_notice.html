<!doctype html>
<html lang="en">
<body style="margin:0;background:#f4f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#181512">
  <div style="max-width:560px;margin:0 auto;padding:32px 18px">
    <div style="background:#fff;border:1px solid #c8ccd1;border-top:3px solid #7d8288;border-radius:10px;padding:28px;box-shadow:0 18px 45px rgba(54,59,64,.08)">
      <h1 style="font-family:Georgia,serif;margin:0 0 14px;font-size:28px;color:#111">New AdCritic signup</h1>
      <table cellpadding="0" cellspacing="0" style="width:100%;font-size:15px;line-height:1.6;color:#34393e">
        <tr>
          <td style="padding:6px 0;color:#7d8288;font-weight:700;width:120px">Plan</td>
          <td style="padding:6px 0">{{ plan }}</td>
        </tr>
        <tr>
          <td style="padding:6px 0;color:#7d8288;font-weight:700">Email</td>
          <td style="padding:6px 0">{{ user.email }}</td>
        </tr>
        <tr>
          <td style="padding:6px 0;color:#7d8288;font-weight:700">Name</td>
          <td style="padding:6px 0">{{ user.public_name }}</td>
        </tr>
        <tr>
          <td style="padding:6px 0;color:#7d8288;font-weight:700">Language</td>
          <td style="padding:6px 0">{{ language }}</td>
        </tr>
        <tr>
          <td style="padding:6px 0;color:#7d8288;font-weight:700">User ID</td>
          <td style="padding:6px 0">{{ user.id }}</td>
        </tr>
      </table>
    </div>
  </div>
</body>
</html>
