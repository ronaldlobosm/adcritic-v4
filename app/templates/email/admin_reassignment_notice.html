<!doctype html>
<html lang="es">
<body style="margin:0;background:#f6f2ea;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#181512">
  <div style="max-width:560px;margin:0 auto;padding:32px 18px">
    <div style="background:#fff;border:1px solid #e5ded2;border-radius:10px;padding:28px">
      <h1 style="font-family:Georgia,serif;margin:0 0 14px;font-size:28px;color:#111">AdCritic</h1>
      <p style="font-size:16px;line-height:1.6;margin:0 0 18px">
        Se eliminó el usuario <strong>{{ deleted_user_email }}</strong>.
      </p>
      <p style="font-size:15px;line-height:1.6;margin:0 0 18px;color:#5f5952">
        Su contenido fue reasignado a tu cuenta de administrador y marcado como borrador para revisión.
      </p>
      <ul style="font-size:15px;line-height:1.7;margin:0 0 24px;color:#5f5952">
        <li>Anuncios enviados a borrador: {{ ads_count }}</li>
        <li>Publicaciones enviadas a borrador: {{ posts_count }}</li>
      </ul>
      <p style="margin:0">
        <a href="{{ admin_url }}" style="display:inline-block;background:#17120f;color:#fff;text-decoration:none;border-radius:6px;padding:12px 18px;font-weight:700">
          Revisar en el admin
        </a>
      </p>
    </div>
  </div>
</body>
</html>
