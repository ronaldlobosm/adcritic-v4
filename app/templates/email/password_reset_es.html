<!doctype html>
<html lang="es">
<body style="margin:0;background:#f4f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#181512">
  <div style="max-width:560px;margin:0 auto;padding:32px 18px">
    <div style="background:#fff;border:1px solid #c8ccd1;border-top:3px solid #7d8288;border-radius:10px;padding:28px;box-shadow:0 18px 45px rgba(54,59,64,.08)">
      <h1 style="font-family:Georgia,serif;margin:0 0 14px;font-size:28px;color:#111">AdCritic</h1>
      <p style="font-size:16px;line-height:1.6;margin:0 0 18px">
        Recibimos una solicitud para restablecer tu contraseña.
      </p>
      <p style="font-size:15px;line-height:1.6;margin:0 0 24px;color:#5f5952">
        Este enlace vence en 1 hora. Si no solicitaste este cambio, puedes ignorar este correo.
      </p>
      <p style="margin:0 0 24px">
        <a href="{{ reset_link }}" style="display:inline-block;background:linear-gradient(145deg,#fff,#c8ccd1 44%,#7d8288 45%,#f2f3f4 76%,#fff);color:#17191b;text-decoration:none;border-radius:6px;padding:12px 18px;font-weight:800;border:1px solid #7d8288">
          Crear nueva contraseña
        </a>
      </p>
      <p style="font-size:13px;line-height:1.5;color:#7c746b;margin:0">
        Si el botón no funciona, copia y pega este enlace:<br>
        <a href="{{ reset_link }}" style="color:#5f666d">{{ reset_link }}</a>
      </p>
    </div>
  </div>
</body>
</html>
