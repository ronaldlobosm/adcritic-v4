services:
  - type: web
    name: adcritic
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: adcritic-db
          property: connectionString

databases:
  - name: adcritic-db
    plan: free
